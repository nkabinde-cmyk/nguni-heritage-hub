<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguni Heritage Hub</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Nguni Heritage Hub</h1>
        <p>Preserving, Celebrating & Sharing Nguni Heritage</p>
    </header>

    <main>

        <section class="search-section">

            <input
                type="text"
                id="searchInput"
                placeholder="Search your surname...">

            <button onclick="searchClan()">Search</button>

        </section>

        <section id="result">

            <h2>Welcome</h2>

            <p>
                Search for a surname to discover its
                izithakazelo, history and heritage.
            </p>

        </section>

    </main>

    <script src="clans.js"></script>
    <script src="script.js"></script>
<footer>
    <p>© 2026 Nguni Heritage Hub</p>
    <p>Preserving Nguni heritage for future generations.</p>
</footer>
</body>

</html>
